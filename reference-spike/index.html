<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chroma Spike — WebGL2 Pileup</title>
    <style>
      :root {
        --surface-0: #0a0a0b;
        --surface-1: #131316;
        --surface-2: #1c1c20;
        --ink-primary: #fafafa;
        --ink-secondary: #a1a1aa;
        --accent: #60a5fa;
        --font-ui: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: var(--surface-0);
        color: var(--ink-primary);
        font-family: var(--font-ui);
        font-size: 13px;
        overflow: hidden;
      }
      header {
        height: 48px;
        display: flex; align-items: center; gap: 24px;
        padding: 0 16px;
      }
      .logo { font-family: var(--font-mono); font-weight: 500; letter-spacing: -0.02em; }
      .logo::before {
        content: ''; display: inline-block;
        width: 10px; height: 10px; margin-right: 8px;
        background: linear-gradient(135deg, #4caf50, #f44336);
        vertical-align: -1px;
      }
      .controls { display: flex; gap: 12px; align-items: center; }
      .controls label { color: var(--ink-secondary); font-size: 12px; }
      select, button {
        background: var(--surface-1);
        color: var(--ink-primary);
        border: 0;
        padding: 4px 10px;
        font-family: var(--font-ui);
        font-size: 12px;
        border-radius: 3px;
        cursor: pointer;
      }
      select:hover, button:hover { background: var(--surface-2); }
      .stats {
        margin-left: auto;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--ink-secondary);
        display: flex; gap: 16px;
      }
      .stats .v { color: var(--ink-primary); }
      .stats .ok { color: #4ade80; }
      .stats .warn { color: #fbbf24; }
      .stats .bad { color: #f87171; }
      #stage {
        position: relative;
        width: 100%;
        height: calc(100% - 48px - 28px);
        cursor: grab;
      }
      #stage.dragging { cursor: grabbing; }
      canvas { display: block; width: 100%; height: 100%; }
      .ruler {
        position: absolute; bottom: 0; left: 0; right: 0; height: 28px;
        background: var(--surface-1);
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--ink-secondary);
        padding: 0 16px;
        display: flex; align-items: center;
        gap: 24px;
      }
      kbd {
        background: var(--surface-2);
        padding: 1px 5px;
        border-radius: 3px;
        font-family: var(--font-mono);
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <header>
      <span class="logo">Chroma · spike</span>
      <div class="controls">
        <label>reads <select id="count">
          <option value="10000">10K</option>
          <option value="100000" selected>100K</option>
          <option value="500000">500K</option>
          <option value="1000000">1M</option>
        </select></label>
        <label>mode <select id="mode">
          <option value="pileup" selected>pileup</option>
          <option value="coverage">coverage</option>
        </select></label>
        <button id="benchBtn">run bench</button>
      </div>
      <div class="stats">
        <span>fps <span class="v" id="fps">—</span></span>
        <span>frame <span class="v" id="frameMs">—</span> ms</span>
        <span>draw <span class="v" id="drawMs">—</span> ms</span>
        <span>reads <span class="v" id="readCount">—</span></span>
        <span>rows <span class="v" id="rows">—</span></span>
      </div>
    </header>
    <div id="stage">
      <canvas id="gl"></canvas>
    </div>
    <div class="ruler">
      <span id="locus">—</span>
      <span><kbd>drag</kbd> pan · <kbd>wheel</kbd> zoom · <kbd>0</kbd> reset</span>
    </div>

    <script type="module" src="/src/spike-main.ts"></script>
  </body>
</html>
